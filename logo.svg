<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.80" />
    </radialGradient>
    
    <!-- Accent Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="50%" stop-color="#7c7aeb" />
      <stop offset="100%" stop-color="#5a189a" />
    </linearGradient>
    
    <!-- Neon Cyan Gradient for Connection/Arrows -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Metallic Gold/Orange for the Key/Lock -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9f1c" />
      <stop offset="100%" stop-color="#ff4000" />
    </linearGradient>
    
    <!-- Drop Shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.6" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark techy background card -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" stroke="#a5b4fc" stroke-width="6" />

  <g filter="url(#dropShadow)">
    <!-- Stylized Cloud / Network (SFTP) - Centrado aplicando un desplazamiento de -29px en X -->
    <g transform="translate(-29, 0)">
      <path d="M180,280 C130,280 100,240 100,190 C100,135 145,95 200,95 C220,95 245,102 260,115 C280,80 320,60 360,60 C420,60 470,110 470,170 C470,225 430,280 370,280 Z" 
            fill="none" stroke="url(#purpleGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
    </g>

    <!-- Local Hard Drive Bracket / Mounting Target -->
    <path d="M120,380 L120,430 C120,446 134,460 150,460 L362,460 C378,460 392,446 392,430 L392,340 C392,324 378,310 362,310 L260,310 L230,280 L150,280 C134,280 120,294 120,310 Z" 
          fill="url(#purpleGrad)" opacity="0.15" />
    <path d="M120,380 L120,430 C120,446 134,460 150,460 L362,460 C378,460 392,446 392,430 L392,340 C392,324 378,310 362,310 L260,310 L230,280 L150,280 C134,280 120,294 120,310 Z" 
          fill="none" stroke="url(#purpleGrad)" stroke-width="16" stroke-linejoin="round" />

    <!-- A disk platter visual inside the folder representation -->
    <circle cx="256" cy="385" r="45" fill="none" stroke="url(#purpleGrad)" stroke-width="8" opacity="0.5" />
    <circle cx="256" cy="385" r="12" fill="url(#purpleGrad)" />

    <!-- SSH Secure Key / Shield Icon in the center -->
    <g transform="translate(231, 130)">
      <!-- Key outline -->
      <path d="M25,0 C38.8,0 50,11.2 50,25 C50,34.8 44.3,43.2 36,47.3 L36,90 L25,100 L14,90 L25,80 L14,70 L25,60 L14,50 C5.7,45.8 0,34.8 0,25 C0,11.2 11.2,0 25,0 Z" 
            fill="url(#accentGrad)" filter="url(#glow)" />
      <!-- Lock keyhole -->
      <circle cx="25" cy="25" r="6" fill="#14141f" />
      <path d="M22,25 L28,25 L30,42 L20,42 Z" fill="#14141f" />
    </g>

    <!-- Neon Connection Arrows representing Mount/Synchronization -->
    <!-- Downward transfer arrow -->
    <path d="M170,200 L170,300 M170,300 L155,285 M170,300 L185,285" 
          fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <!-- Upward transfer arrow -->
    <path d="M342,300 L342,200 M342,200 L327,215 M342,200 L357,215" 
          fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>
</svg>
